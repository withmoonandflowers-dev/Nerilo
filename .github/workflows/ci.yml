# CI：品質門檻 + 可選 E2E，通過後可觸發部署
# 品質門檻失敗會擋住 PR / push；E2E 可設為可選或僅跑穩定子集

name: CI

on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master, develop]
  workflow_dispatch:

env:
  NODE_VERSION: '20'

jobs:
  quality:
    name: Quality Gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check

      - name: Lint
        run: npm run lint

      - name: Audit (fail on high/critical)
        run: npm audit --audit-level=high
        continue-on-error: true
        # 若希望嚴格擋下：改為 continue-on-error: false

      - name: Unit tests
        run: npm run test:run

  e2e:
    name: E2E (stable subset)
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright (Chromium only)
        run: npx playwright install --with-deps chromium

      # vite --mode test forces Firebase to use localhost emulator
      # (see src/config/firebase.ts). Without emulators, anonymous login
      # fails and every UI test that waits for `.role-badge` times out.
      - name: Set up Java (Firebase emulator dependency)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Run E2E (stable subset, no WebRTC-dependent) under Firebase emulators
        run: |
          npx firebase-tools emulators:exec --only auth,firestore --project nerilo \
            "npx playwright test tests/e2e/waiting-room.spec.ts tests/e2e/room-timeout.spec.ts tests/e2e/room-closed.spec.ts tests/e2e/room-management.spec.ts --timeout=90000"
        env:
          CI: true
        continue-on-error: true
        # 若 E2E 必須通過才合併：改為 continue-on-error: false

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

  deploy:
    name: Deploy Hosting
    runs-on: ubuntu-latest
    needs: [quality, e2e]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}

      - name: Deploy to Firebase Hosting
        run: npx firebase deploy --only hosting --token "$FIREBASE_TOKEN"
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        # 需在 GitHub repo Settings → Secrets 新增 FIREBASE_TOKEN（firebase login:ci 取得）
        # 若暫不自動部署，可刪除此 job 或改為 workflow_dispatch 手動觸發
        continue-on-error: true
