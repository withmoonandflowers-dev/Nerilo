# CI：品質門檻 + 可選 E2E，通過後可觸發部署
# 品質門檻失敗會擋住 PR / push；E2E 可設為可選或僅跑穩定子集

name: CI

on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master, develop]
  workflow_dispatch:

env:
  # Node 24 = npm 11, matching the dev machine that generates package-lock.json.
  # npm 10 (Node 20, EOL 2026-04) fails `npm ci` on union ranges like "^0.27.0 || ^0.28.0".
  NODE_VERSION: '24'

jobs:
  quality:
    name: Quality Gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check

      - name: Lint
        run: npm run lint

      - name: Audit (fail on high/critical)
        run: npm audit --audit-level=high
        continue-on-error: true
        # 若希望嚴格擋下：改為 continue-on-error: false

      - name: Unit tests
        run: npm run test:run

  e2e:
    name: E2E (stable subset, emulator-backed)
    runs-on: ubuntu-latest
    needs: quality
    timeout-minutes: 30  # a hung download must not burn 6h of Actions minutes
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Firebase emulators need a JRE — pin Java 21 explicitly (firebase-tools 15+ requires JDK 21+).
      - name: Setup Java 21 (for Firebase emulators)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Cache Firebase emulator binaries
        uses: actions/cache@v4
        with:
          path: ~/.cache/firebase/emulators
          key: firebase-emulators-${{ runner.os }}-v1

      # Cache browsers — the CDN download is the most hang-prone step in CI
      # (2026-06-10: three consecutive runs hung here for 18-100+ minutes).
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright (Chromium only)
        run: npx playwright install chromium
        timeout-minutes: 10

      - name: Run E2E stable subset against emulators
        run: npm run test:e2e:stable
        env:
          CI: 'true'
        continue-on-error: true
        # Now emulator-backed, so anonymous-auth tests can actually pass.
        # Once green for a few weeks: flip to continue-on-error: false to gate merges.

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

  # Deploy is handled by firebase-deploy.yml (service-account auth on master push).
  # The legacy token-based deploy job that lived here was never functional
  # (FIREBASE_TOKEN secret never set, gated on the soft E2E job) and would have
  # double-deployed alongside firebase-deploy.yml once E2E goes green.
