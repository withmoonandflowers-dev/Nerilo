# CI：品質門檻 + 可選 E2E，通過後可觸發部署
# 品質門檻失敗會擋住 PR / push；E2E 可設為可選或僅跑穩定子集

name: CI

on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master, develop]
  workflow_dispatch:

env:
  # Node 24 = npm 11, matching the dev machine that generates package-lock.json.
  # npm 10 (Node 20, EOL 2026-04) fails `npm ci` on union ranges like "^0.27.0 || ^0.28.0".
  NODE_VERSION: '24'

jobs:
  quality:
    name: Quality Gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check

      - name: Lint
        run: npm run lint

      - name: Audit (fail on high/critical)
        run: npm audit --audit-level=high
        continue-on-error: true
        # 若希望嚴格擋下：改為 continue-on-error: false

      - name: Unit tests
        run: npm run test:run

      # 稽核不變量硬閘（core-invariants R8）：SDK 進入點必須脫離 Firebase。
      # 先建 dist（供 eager 進入點檢查），再跑靜態圖 + dist 雙檢；破則擋 merge。
      - name: Build SDK (dist)
        run: npm run build:sdk

      - name: QA gate — SDK firebase isolation
        run: npm run qa:sdk-isolation

  vue-quality:
    name: Vue Quality Gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: web-vue/package-lock.json

      - name: Install Vue dependencies
        run: npm ci --prefix web-vue

      # 硬閘：接班版即使尚未 production，也不得合併型別壞掉或無法產出靜態站的版本。
      - name: Type check Vue app
        run: npm run type-check --prefix web-vue

      - name: Generate Vue static app
        run: npm run generate --prefix web-vue

  e2e:
    name: E2E (stable subset, emulator-backed)
    runs-on: ubuntu-latest
    needs: quality
    timeout-minutes: 30
    # Run inside the official Playwright image: browsers + system deps are
    # pre-baked, so we never hit the flaky `playwright install` CDN download
    # (it hung/timed out on ~every prior run). Tag MUST match @playwright/test.
    container:
      image: mcr.microsoft.com/playwright:v1.57.0-noble
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Firebase emulators need a JRE — pin Java 21 explicitly (firebase-tools 15+ requires JDK 21+).
      - name: Setup Java 21 (for Firebase emulators)
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Cache Firebase emulator binaries
        uses: actions/cache@v4
        with:
          path: ~/.cache/firebase/emulators
          key: firebase-emulators-${{ runner.os }}-v1

      # 觀察期自 2026-07-13 起算（稽核 R8）：連續兩週綠 → 2026-07-27 後翻 continue-on-error: false
      - name: Run E2E stable subset against emulators
        run: npm run test:e2e:stable
        env:
          CI: 'true'
        continue-on-error: true
        # Now emulator-backed, so anonymous-auth tests can actually pass.
        # Once green for a few weeks: flip to continue-on-error: false to gate merges.

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

  vue-e2e:
    name: Vue E2E (stable subset, emulator-backed)
    runs-on: ubuntu-latest
    needs: [quality, vue-quality]
    timeout-minutes: 30
    container:
      image: mcr.microsoft.com/playwright:v1.57.0-noble
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            web-vue/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install Vue dependencies
        run: npm ci --prefix web-vue

      - name: Cache Firebase emulator binaries
        uses: actions/cache@v4
        with:
          path: ~/.cache/firebase/emulators
          key: firebase-emulators-${{ runner.os }}-v1

      # 2026-07-16 起觀察；2026-07-30 後若連續綠，移除 continue-on-error 才具備切換資格。
      - name: Run Vue stable E2E against emulators
        run: >
          npx firebase-tools emulators:exec --only auth,firestore --project nerilo
          "npx playwright test --config playwright.vue.config.ts --grep @vue-stable --workers=1 --reporter=list"
        env:
          CI: 'true'
        continue-on-error: true

      - name: Upload Vue Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-vue
          path: playwright-report/
          retention-days: 14

  # Deploy is handled by firebase-deploy.yml (service-account auth on master push).
  # The legacy token-based deploy job that lived here was never functional
  # (FIREBASE_TOKEN secret never set, gated on the soft E2E job) and would have
  # double-deployed alongside firebase-deploy.yml once E2E goes green.
