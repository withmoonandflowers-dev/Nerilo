# E2E Tests with Firebase emulators
#
# Boots Auth + Firestore emulators via firebase-tools (now a devDependency)
# and runs the full Playwright suite against them. No manual emulator setup
# required.
#
# The main CI gate (.github/workflows/ci.yml) only runs the "stable subset"
# of tests; this workflow runs everything, and is allowed to fail without
# blocking the merge queue (continue-on-error on the test step).

name: E2E Tests (Full)

on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master, develop]
  workflow_dispatch:

jobs:
  e2e-tests:
    name: E2E Tests (emulator-backed)
    runs-on: ubuntu-latest
    timeout-minutes: 45  # a hung download must not burn 6h of Actions minutes

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Firebase emulators require a JRE. ubuntu-latest ships with one but
      # pin the version explicitly so a runner image change doesn't break us.
      - name: Setup Java 21 (for Firebase emulators)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      # Cache the emulator binaries (~150 MB) so subsequent runs are fast.
      - name: Cache Firebase emulator binaries
        uses: actions/cache@v4
        with:
          path: ~/.cache/firebase/emulators
          key: firebase-emulators-${{ runner.os }}-v1

      # Cache browsers — the CDN download is the most hang-prone step in CI
      # (2026-06-10: three consecutive runs hung here for 18-100+ minutes).
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers (Chromium)
        run: npx playwright install --with-deps chromium
        timeout-minutes: 10

      - name: Run E2E tests against emulators
        run: npm run test:e2e:ci
        env:
          CI: 'true'
          # The app's src/config/firebase.ts auto-detects Vite mode=test and
          # connects to 127.0.0.1:9099 (Auth) / 127.0.0.1:8080 (Firestore).
          # No secrets needed — emulators accept a fake API key.
        continue-on-error: true

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Upload test traces / videos on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/
          retention-days: 7
