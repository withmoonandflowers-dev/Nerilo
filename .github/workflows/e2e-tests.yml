# 全量 E2E（含依賴 WebRTC 的案例）；主 CI 門檻為 .github/workflows/ci.yml（品質 + 穩定 E2E 子集）
name: E2E Tests (Full)

on:
  push:
    branches: [ master, develop ]
  pull_request:
    branches: [ master, develop ]
  workflow_dispatch: # 允許手動觸發

jobs:
  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      # Firebase emulator (auth + firestore) is required because vite runs in
      # --mode test, which short-circuits Firebase config to localhost emulator
      # endpoints (see src/config/firebase.ts). Without emulators, the app
      # cannot authenticate or reach Firestore → ERR_CONNECTION_REFUSED.
      - name: Set up Java (Firebase emulator dependency)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Run E2E tests under Firebase emulators
        run: npx firebase-tools emulators:exec --only auth,firestore --project nerilo 'npm run test:e2e'
        env:
          CI: true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Upload test videos
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-videos
          path: test-results/
          retention-days: 7
