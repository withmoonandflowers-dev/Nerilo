# Firebase 自動部署：push 到 master 後自動建置並部署到 Firebase Hosting + Functions + Firestore
name: Deploy to Firebase

on:
  push:
    branches: [master]
  workflow_dispatch: # 允許手動觸發

env:
  NODE_VERSION: '24'

jobs:
  # ── 1. 品質門檻（type-check + lint + unit tests）──────────────────────────
  quality:
    name: Quality Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test:run

  # ── 2. 建置前端 ──────────────────────────────────────────────────────────
  build:
    name: Build App
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          # Firebase 設定由 GitHub Secrets 注入（避免硬編碼在程式碼中）
          # 在 repo Settings → Secrets and variables → Actions 中設定以下 secrets：
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          # TURN（NAT 穿透）— 未設定時 IceServerProvider 退回 STUN-only
          VITE_TURN_URLS: ${{ secrets.VITE_TURN_URLS }}
          VITE_TURN_USERNAME: ${{ secrets.VITE_TURN_USERNAME }}
          VITE_TURN_CREDENTIAL: ${{ secrets.VITE_TURN_CREDENTIAL }}
          # Sentry 上線錯誤追蹤 — 未設定時 initSentry() 為 no-op
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 1

  # ── 3. 建置 Cloud Functions ───────────────────────────────────────────────
  build-functions:
    name: Build Functions
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install Functions dependencies
        run: npm ci --prefix functions

      - name: Build Functions
        run: npm run build --prefix functions

      - name: Upload Functions artifact
        uses: actions/upload-artifact@v4
        with:
          name: functions-lib
          path: functions/lib/
          retention-days: 1

  # ── 4. 部署到 Firebase ────────────────────────────────────────────────────
  deploy:
    name: Deploy to Firebase
    runs-on: ubuntu-latest
    needs: [build, build-functions]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Download Functions artifact
        uses: actions/download-artifact@v4
        with:
          name: functions-lib
          path: functions/lib/

      - name: Install Functions dependencies (for deploy)
        run: npm ci --prefix functions --omit=dev

      # 使用 Service Account JSON 認證（設定在 GitHub Secrets）
      # Secret 名稱：FIREBASE_SERVICE_ACCOUNT_NERILO
      # 取得方式：Firebase Console → Project Settings → Service accounts → Generate new private key
      - name: Write Firebase service account
        run: echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT_NERILO }}' > /tmp/sa.json

      # Functions deliberately excluded: they have never been deployed to
      # production (historical manual deploys were hosting-only), and a first
      # functions deploy requires the Cloud Build API + Blaze billing plan —
      # a cost decision. Re-add 'functions' here once that's made.
      - name: Deploy to Firebase (Hosting + Firestore rules)
        run: >
          npx firebase-tools deploy
          --only hosting,firestore:rules,firestore:indexes
          --project nerilo
          --non-interactive
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/sa.json

      - name: Clean up credentials
        if: always()
        run: rm -f /tmp/sa.json

      - name: Deployment summary
        run: |
          echo "✅ 部署完成！"
          echo "🌐 Hosting: https://nerilo.web.app"
          echo "⚡ Functions: deployed"
          echo "🗄️  Firestore rules + indexes: deployed"
